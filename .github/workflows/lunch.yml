name: Send Lunch Menu

on:
  schedule:
    - cron: '30 3 * * 1-5'  # UTC 03:30 = KST 12:30, 평일만
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - run: pip install dotenv pdfplumber requests

      - run: python main.py
        env:
          WEB_URL: ${{ secrets.WEB_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
